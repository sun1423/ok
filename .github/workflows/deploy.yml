### Step 5 — Enable GitHub Pages
1. Click **Settings** tab (in your repo)
2. Scroll down → click **Pages** in the left sidebar
3. Under **Source** → select **GitHub Actions**
4. Click **Save**

---

### Step 6 — Watch it go live!
1. Click the **Actions** tab
2. You'll see a workflow running — wait ~30 seconds ⏳
3. Once it shows ✅ green, your app is live at:
```
https://YOUR-USERNAME.github.io/devops-agent
