name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Inject Gemini API key from secret
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          sed -i "s|%%GEMINI_KEY%%|${GEMINI_KEY}|g" index.html
          echo "✅ Key injected into build"

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
